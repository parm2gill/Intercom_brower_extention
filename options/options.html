<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Intercom Chat Summarizer Options</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>Intercom Chat Summarizer Settings</h1>
    <div class="form-group">
      <label for="apiKey">Gemini API Key:</label>
      <input type="password" id="apiKey" placeholder="Enter your Gemini API key">
      <small>Your key is stored securely in your browser's local storage and is only used to communicate with the Google Gemini API.</small>
    </div>
    <div class="form-group">
      <label for="model">Gemini Model:</label>
      <select id="model">
        <option value="gemini-3.5-flash">gemini-3.5-flash (Recommended: Fast & Accurate)</option>
        <option value="gemini-3.5-pro">gemini-3.5-pro (More detailed, slower)</option>
        <option value="gemini-3.1-flash-lite">gemini-3.1-flash-lite (Cost-efficient)</option>
      </select>
    </div>
    <button id="saveBtn">Save Settings</button>
    <div id="status" class="status"></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
